<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: black;
        color: rgba(0, 0, 0, 0.437);
        font-family: sans-serif;
      }

      .card {
        border-radius: 20px;
        padding: 20px;
        background: rgba(128, 128, 128, 0.049);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      .btn-copy {
        border-radius: 20px;
      }
    </style>
  </head>

  <body>
    <div class="container py-5">
      <h2 class="text-center mb-5"></h2>

      <div class="row g-4">
        <!-- INDEX -->
        <div class="col-md-4">
          <div class="card text-center">
            
            <button
              class="btn btn-copy mb-2"
              onclick="copyFile('file.html', this)"
            >
              
            </button>

            
          </div>
        </div>

        <!-- REGISTER -->
        <div class="col-md-4">
          <div class="card text-center">
            

            <button
              class="btn btn-copy mb-2"
              onclick="copyFile('register.html', this)"
            >
             
            </button>

            
            </a>
          </div>
        </div>

        <!-- STYLE -->
        <div class="col-md-4">
          <div class="card text-center">
            

            <button
              class="btn btn-copy mb-2"
              onclick="copyFile('style.css', this)"
            >
              
            </button>

            
            </a>
          </div>
        </div>
      </div>
    </div>

    <script>
      async function copyFile(filename, btn) {
        try {
          let response = await fetch(filename);
          if (!response.ok) throw new Error("File not found");

          let text = await response.text();

          await navigator.clipboard.writeText(text);

          let original = btn.innerHTML;
          btn.innerHTML = "!";

          setTimeout(() => {
            btn.innerHTML = original;
          }, 1500);
        } catch (err) {
          console.error(err);
          alert("❌ Cannot copy. Use Live Server!");
        }
      }
    </script>
  </body>
</html>
