<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<div class="container mt-4">
    <h2>Event Registration</h2>

    <form id="registerForm">

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" placeholder="Enter name">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Enter email">
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control" id="phone" placeholder="Enter phone number">
        </div>

        <div class="mb-3">
            <label class="form-label">Institution</label>
            <input type="text" class="form-control" id="institution" placeholder="Enter institution name">
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-control" id="category">
                <option value="">Select</option>
                <option>Student</option>
                <option>Visitor</option>
                <option>Lecturer</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Submit</button>
        <a href="index.html" class="btn btn-secondary">Back</a>

    </form>


    <p id="message" class="mt-3"></p>
</div>

<script>
$(document).ready(function(){

    $("#registerForm").submit(function(e){
        e.preventDefault();

        let name = $("#name").val().trim();
        let email = $("#email").val().trim();
        let phone = $("#phone").val().trim();
        let institution = $("#institution").val().trim();
        let category = $("#category").val();

        let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

        if(name === "" || email === "" || phone === "" || institution === "" || category === ""){
            $("#message").text("⚠ Please fill all fields").removeClass().addClass("text-danger");
            return;
        }

        if(!email.match(emailPattern)){
            $("#message").text("⚠ Enter a valid email address").removeClass().addClass("text-danger");
            return;
        }

        if(!/^\d{10,11}$/.test(phone)){
            $("#message").text("⚠ Enter a valid phone number").removeClass().addClass("text-danger");
            return;
        }

        $("#message").text("✅ Registration Successful!").removeClass().addClass("text-success");

        $("#registerForm")[0].reset();
    });

});
</script>

</body>
</html>
