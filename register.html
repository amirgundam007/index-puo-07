<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Register</title>

    <!-- CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- EXTERNAL CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand">Tech Club</a>

        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="register.html">Register</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- CONTENT -->
    <div class="container mt-4 section">
      <h2 class="text-center mb-4">Register</h2>

      <form id="form" class="col-md-6 mx-auto">
        <input
          type="text"
          id="name"
          class="form-control mb-3"
          placeholder="Full Name"
        />

        <input
          type="email"
          id="email"
          class="form-control mb-3"
          placeholder="Email"
        />

        <input
          type="text"
          id="phone"
          class="form-control mb-3"
          placeholder="Phone Number"
        />

        <select id="category" class="form-select mb-3">
          <option value="" selected disabled>Select Category</option>
          <option value="student">Student</option>
          <option value="developer">Developer</option>
          <option value="lecturer">Lecturer</option>
          <option value="guest">Guest</option>
        </select>

        <button class="btn btn-success w-100">Submit</button>
      </form>

      <p id="successMsg" class="text-center mt-3 text-success"></p>

      <center>
        <a href="index.html" class="btn btn-secondary w-50 mt-3">Home</a>
      </center>
    </div>

    <!-- JS -->
    <script>
      $(document).on("mobileinit", function () {
        $.mobile.ajaxEnabled = false;
      });
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      document.getElementById("form").addEventListener("submit", function (e) {
        e.preventDefault();

        let phone = document.getElementById("phone").value;
        let category = document.getElementById("category").value;

        // Check category wajib pilih
        if (category === "") {
          alert("Please select a category!");
          return;
        }

        // Check phone number numeric
        if (!/^[0-9]+$/.test(phone)) {
          alert("Phone number must be numeric only!");
          return;
        }

        alert("Form submitted successfully!");

        $("#successMsg").text("Registration successful!").show();

        this.reset();
      });
    </script>
  </body>
</html>
